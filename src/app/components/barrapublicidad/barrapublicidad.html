<!-- Barra promocional superior -->
<div
 class="promo-bar-superior-segundo">
  <div *ngFor="let promo of promos" >
      <div class="promo-contenido">
        
        <!-- Nombre de la categoría -->
        <span>{{ promo.titulo }}</span>

        <a [routerLink]="promo.ruta">{{promo.descripcion}}</a>

        <div class="texto">
        <p>{{promo.texto}}</p>

        </div>
        
      </div>
  </div>
</div>
